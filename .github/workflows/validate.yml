name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Test trigger boundaries
        run: python scripts/test_trigger_boundaries.py

      - name: Test README selection
        run: python scripts/test_readme_selection.py

      - name: Test output rendering
        run: python scripts/test_output_rendering.py

      - name: Test installer
        run: python scripts/install_skills.py --target ./tmp/skills --force
