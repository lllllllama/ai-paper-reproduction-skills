name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Test installer targets
        run: python scripts/test_install_targets.py

      - name: Test bootstrapper
        run: python scripts/test_bootstrap_env.py

      - name: Test trigger boundaries
        run: python scripts/test_trigger_boundaries.py

      - name: Test README selection
        run: python scripts/test_readme_selection.py

      - name: Test output rendering
        run: python scripts/test_output_rendering.py

      - name: Test explore output rendering
        run: python scripts/test_explore_output_rendering.py

      - name: Test explore variant matrix
        run: python scripts/test_explore_variant_matrix.py

      - name: Test research explore dry-run
        run: python scripts/test_research_explore_dry_run.py

      - name: Test Codex installer
        run: python scripts/install_skills.py --client codex --target ./tmp/codex-skills --force

      - name: Test Claude installer
        run: python scripts/install_skills.py --client claude --target ./tmp/claude-skills --force
